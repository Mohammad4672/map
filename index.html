<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلة رُبى للنجاح</title>

<style>
body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    overflow:hidden;
}

h1{
    text-align:center;
    margin-top:30px;
}

.road{
    position:relative;
    width:90%;
    height:300px;
    margin:80px auto;
}

.step{
    position:absolute;
    width:120px;
    text-align:center;
    font-size:22px;
}

.step span{
    display:block;
    font-size:60px;
    margin-bottom:10px;
}

.s1{right:0; top:120px;}
.s2{right:25%; top:40px;}
.s3{right:50%; top:160px;}
.s4{right:75%; top:50px;}

.line{
    position:absolute;
    top:150px;
    left:5%;
    width:90%;
    height:8px;
    background:white;
    border-radius:10px;
}

.car{
    position:absolute;
    top:105px;
    right:0;
    font-size:55px;
    animation:drive 8s linear forwards;
}

@keyframes drive{
    from{
        right:0;
    }
    to{
        right:78%;
    }
}

#final{
    display:none;
    text-align:center;
    font-size:34px;
    animation:show 1s;
}

@keyframes show{
    from{
        opacity:0;
        transform:scale(.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>

<body>

<h1>🌟 رحلة رُبى نحو النجاح 🌟</h1>

<div class="road">
    <div class="line"></div>

    <div class="step s1">
        <span>📚</span>
        تعب ودراسة
    </div>

    <div class="step s2">
        <span>😴</span>
        سهر وتعب
    </div>

    <div class="step s3">
        <span>✍️</span>
        امتحانات
    </div>

    <div class="step s4">
        <span>🏆</span>
        نجاح
    </div>

    <div class="car">🚗</div>
</div>

<div id="final">
    🎉 مبروك يا رُبى 🎉<br><br>
    وصلتي للنهاية بعد كل التعب ❤️🏆
</div>

<script>
setTimeout(()=>{
    document.querySelector(".road").style.display="none";
    document.getElementById("final").style.display="block";
},8500);
</script>

</body>
</html>
