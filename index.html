<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حديقة رُبى المضيئة 🌹✨</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:Tahoma,sans-serif;
    background:linear-gradient(to top,#c8f7c5,#dff6ff,#fff0f6);
    position:relative;
}

#start{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:rgba(255,255,255,.4);
    backdrop-filter:blur(8px);
    z-index:100;
}

#start h1{
    color:#ff4d8d;
    margin-bottom:25px;
    text-align:center;
}

#start button{
    padding:18px 35px;
    font-size:24px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:white;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.cloud{
    position:absolute;
    font-size:50px;
    animation:moveCloud 30s linear infinite;
}

@keyframes moveCloud{
    from{transform:translateX(-200px);}
    to{transform:translateX(120vw);}
}

.flower{
    position:absolute;
    bottom:-150px;
    font-size:80px;
    animation:growFlower 5s forwards;
}

@keyframes growFlower{
    from{
        transform:translateY(300px) scale(0);
        opacity:0;
    }
    to{
        transform:translateY(-350px) scale(1.2);
        opacity:1;
    }
}

.sparkle{
    position:absolute;
    font-size:20px;
    animation:spark 3s linear forwards;
}

@keyframes spark{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-150px);
        opacity:0;
    }
}

#message{
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:rgba(255,255,255,.85);
    z-index:50;
    padding:20px;
}

#message h1{
    color:#ff4d8d;
    font-size:60px;
    margin-bottom:20px;
}

#message p{
    color:#444;
    font-size:28px;
    max-width:800px;
    line-height:1.8;
}
</style>
</head>
<body>

<div id="start">
    <h1>🌷 حديقة رُبى المضيئة 🌷</h1>
    <button onclick="begin()">اضغطي هون 🌹</button>
</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="message">
    <h1>🌹 رُبى 🌹</h1>

    <p>
        مثل هالورود اللي مليت الحديقة 🌷<br>
        مليتي الأيام تعب وإصرار وأمل ✨<br><br>

        وكل خطوة مشيتيها قرّبتك أكتر من النجاح 🏆<br><br>

        مبروك من القلب ❤️<br>
        وبتستاهلي كل الفرح بالعالم 🌸✨
    </p>
</div>

<script>

// غيوم
for(let i=0;i<8;i++){
    let cloud=document.createElement("div");
    cloud.className="cloud";
    cloud.innerHTML="☁️";
    cloud.style.top=Math.random()*40+"vh";
    cloud.style.animationDuration=(20+Math.random()*20)+"s";
    document.body.appendChild(cloud);
}

function begin(){

    document.getElementById("start").style.display="none";

    const music=document.getElementById("music");
    music.play().catch(()=>{});

    const flowers=["🌹","🌷","🌺","🌸","💐"];

    let count=0;

    const interval=setInterval(()=>{

        let flower=document.createElement("div");
        flower.className="flower";
        flower.innerHTML=flowers[Math.floor(Math.random()*flowers.length)];

        flower.style.left=Math.random()*95+"vw";

        document.body.appendChild(flower);

        for(let i=0;i<4;i++){

            let sparkle=document.createElement("div");
            sparkle.className="sparkle";
            sparkle.innerHTML="✨";

            sparkle.style.left=flower.style.left;
            sparkle.style.bottom="200px";

            document.body.appendChild(sparkle);

            setTimeout(()=>sparkle.remove(),3000);
        }

        count++;

        if(count>=120){

            clearInterval(interval);

            setTimeout(()=>{
                document.getElementById("message").style.display="flex";
            },4000);
        }

    },120);
}
</script>

</body>
</html>
