<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رحلة رُبى للنجاح 🦋🌹</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}
body{
overflow:hidden;
height:100vh;
background:linear-gradient(to top,#c7f9cc,#d8f3ff,#fff0f6);
position:relative;
}
#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:.08;
pointer-events:none;
}
#start{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
background:rgba(255,255,255,.7);
backdrop-filter:blur(5px);
}
#start h1{
font-size:55px;
color:#ff4f8b;
margin-bottom:20px;
}
#start button{
padding:18px 35px;
font-size:24px;
border:none;
border-radius:20px;
cursor:pointer;
}
#game{
display:none;
width:100%;
height:100%;
position:relative;
}
#butterfly{
position:absolute;
font-size:70px;
transition:1s ease;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}
.flower{
position:absolute;
font-size:50px;
cursor:pointer;
animation:float 3s infinite ease-in-out;
}
@keyframes float{
50%{transform:translateY(-15px);}
}
#message{
position:absolute;
top:40px;
width:100%;
text-align:center;
font-size:28px;
color:#444;
font-weight:bold;
}
#final{
display:none;
position:absolute;
inset:0;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:rgba(255,255,255,.92);
z-index:20;
padding:20px;
}
#final h1{
font-size:70px;
color:#ff4f8b;
margin-bottom:20px;
}
#final p{
font-size:30px;
line-height:1.8;
color:#444;
}
.confetti{
position:absolute;
font-size:30px;
animation:fall 4s linear forwards;
}
@keyframes fall{
from{
transform:translateY(-100px);
}
to{
transform:translateY(110vh);
}
}
</style>
</head>
<body>
<video id="bgVideo" loop>
<source src="music.mp4" type="video/mp4">
</video>
<div id="start">
<h1>🦋 رحلة رُبى السحرية 🦋</h1>
<button onclick="startJourney()">ابدئي الرحلة 🌸</button>
</div>
<div id="game">
<div id="message">اضغطي على الوردة الأولى 🌸</div>
<div id="butterfly">🦋</div>
</div>
<div id="final">
<h1>🌹 رُبى 🌹</h1>
<p>
يمكن الطريق ما كان سهل...<br><br>
لكنّك كملتي للآخر ❤️<br>
وتعبك ما راح هدر ✨<br><br>
كل وردة جمعتيها بهالرحلة<br>
بتمثل خطوة من تعبك وإصرارك 🌸<br><br>
مبروك يا رُبى 🏆💖✨
</p>
</div>
<script>
const messages = [
"كان في بنت قوية ما استسلمت 🌸",
"سهرت وتعبت حتى توصل 🌙",
"واجهت الامتحانات بشجاعة ✍️",
"كل خطوة قربتها من حلمها ✨",
"وصلت رُبى للنجاح 🌹🏆"
];
let collected = 0;
function startJourney(){
document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";
const video=document.getElementById("bgVideo");
video.play().catch(()=>{});
spawnFlower();
}
function spawnFlower(){
const flower=document.createElement("div");
flower.className="flower";
flower.innerHTML=["🌸","🌷","🌹","💐"][Math.floor(Math.random()*4)];
flower.style.left=Math.random()*85+"vw";
flower.style.top=(15+Math.random()*65)+"vh";
flower.onclick=function(){
moveButterfly(flower.offsetLeft,flower.offsetTop);
setTimeout(()=>{
flower.remove();
document.getElementById("message").innerHTML=
messages[collected];
collected++;
if(collected<5){
spawnFlower();
}else{
finishJourney();
}
},1000);
};
document.getElementById("game").appendChild(flower);
}
function moveButterfly(x,y){
const butterfly=document.getElementById("butterfly");
butterfly.style.left=x+"px";
butterfly.style.top=y+"px";
}
function finishJourney(){
setTimeout(()=>{
document.getElementById("game").style.display="none";
document.getElementById("final").style.display="flex";
for(let i=0;i<200;i++){
let c=document.createElement("div");
c.className="confetti";
c.innerHTML=["🎉","✨","🌸","💖","🌹"][Math.floor(Math.random()*5)];
c.style.left=Math.random()*100+"vw";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
}
},1500);
}
</script>
</body>
</html>
