<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Access</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Consolas,monospace;
}
body{
background:#050505;
overflow:hidden;
color:#00ff99;
}
canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}
#overlay{
position:fixed;
inset:0;
background:radial-gradient(circle at center,
rgba(0,255,180,.08),
transparent 60%);
z-index:-1;
}
#terminal{
padding:25px;
font-size:20px;
line-height:1.7;
height:100vh;
overflow:hidden;
}
.line{
margin-bottom:6px;
}
#progressBox{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:80%;
height:24px;
border:2px solid #00ff99;
}
#progress{
height:100%;
width:0%;
background:#00ff99;
}
.glitch{
animation:glitch .08s infinite;
}
@keyframes glitch{
0%{transform:translate(2px,0);}
50%{transform:translate(-2px,0);}
100%{transform:translate(2px,0);}
}
#final{
display:none;
position:fixed;
inset:0;
justify-content:center;
align-items:center;
flex-direction:column;
background:rgba(0,0,0,.9);
text-align:center;
}
#final h1{
font-size:90px;
color:#00ffcc;
text-shadow:
0 0 15px #00ffcc,
0 0 30px #00ffcc,
0 0 60px #00ffcc;
}
#final h2{
margin-top:20px;
font-size:40px;
color:#fff;
}
#final p{
margin-top:25px;
font-size:26px;
max-width:800px;
color:#ddd;
line-height:1.8;
}
</style>
</head>
<body>
<video id="music" autoplay loop style="display:none">
<source src="music.mp4" type="video/mp4">
</video>
<canvas id="matrix"></canvas>
<div id="overlay"></div>
<div id="terminal"></div>
<div id="progressBox">
<div id="progress"></div>
</div>
<div id="final">
<h1>RUBA</h1>
<h2>ACCESS GRANTED ✅</h2>
<p>
Effort Analysis Complete...<br>
Dedication: 100%<br>
Courage: MAXIMUM<br>
Persistence: LEGENDARY<br><br>
🏆 STATUS UPDATED<br>
STUDENT → LEGEND
</p>
</div>
<script>
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
const chars="01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const size=16;
const cols=Math.floor(canvas.width/size);
const drops=Array(cols).fill(1);
function draw(){
ctx.fillStyle="rgba(0,0,0,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#00ff99";
ctx.font=size+"px monospace";
for(let i=0;i<drops.length;i++){
const text=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(text,i*size,drops[i]*size);
if(drops[i]*size>canvas.height && Math.random()>0.975){
drops[i]=0;
}
drops[i]++;
}
}
setInterval(draw,35);
const lines=[
"[SYSTEM] Connecting...",
"[SYSTEM] Accessing Exam Database...",
"[SYSTEM] Searching Student...",
"[FOUND] RUBA",
"[SCAN] Study Hours...",
"[OK] 999 Hours Detected",
"[SCAN] Determination...",
"[OK] LEGENDARY",
"[SCAN] Stress Resistance...",
"[OK] MAXIMUM",
"[SCAN] Success Probability...",
"[OK] 100%",
"[DECRYPT] Hidden Future...",
"[SUCCESS] FILE UNLOCKED"
];
const terminal=document.getElementById("terminal");
const progress=document.getElementById("progress");
let index=0;
let percent=0;
function nextLine(){
if(index>=lines.length){
launchFinal();
return;
}
let div=document.createElement("div");
div.className="line";
div.textContent=lines[index];
terminal.appendChild(div);
percent+=100/lines.length;
progress.style.width=percent+"%";
if(index===10){
document.body.classList.add("glitch");
setTimeout(()=>{
document.body.classList.remove("glitch");
},1200);
}
index++;
setTimeout(nextLine,900);
}
function launchFinal(){
document.getElementById("progressBox").style.display="none";
setTimeout(()=>{
document.getElementById("final").style.display="flex";
},1000);
}
nextLine();
</script>
</body>
</html>
